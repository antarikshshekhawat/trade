<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NSE Alpha — Signal Terminal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
/* ═══════════════════════════════════════════════════════════════
   TOKENS
═══════════════════════════════════════════════════════════════ */
:root {
  --bg0:      #05080f;
  --bg1:      #080d17;
  --bg2:      #0b1120;
  --bg3:      #0f1629;
  --bg4:      #141d33;
  --bg5:      #1a2540;
  --line:     rgba(255,255,255,0.06);
  --line2:    rgba(255,255,255,0.10);

  --ink0:     #f0f4ff;
  --ink1:     #a8b8d8;
  --ink2:     #5a6e92;
  --ink3:     #2e3f60;

  --go:       #00e676;
  --go2:      #69f0ae;
  --go-dim:   rgba(0,230,118,0.12);
  --go-glow:  rgba(0,230,118,0.25);

  --stop:     #ff3d57;
  --stop2:    #ff7087;
  --stop-dim: rgba(255,61,87,0.12);

  --warn:     #ffb300;
  --warn2:    #ffd54f;
  --warn-dim: rgba(255,179,0,0.12);

  --blue:     #2979ff;
  --blue2:    #82b1ff;
  --blue-dim: rgba(41,121,255,0.12);
  --blue-glow:rgba(41,121,255,0.30);

  --cyan:     #00e5ff;
  --purple:   #aa00ff;
  --purple2:  #ce93d8;

  --font-data: 'IBM Plex Mono', monospace;
  --font-ui:   'DM Sans', sans-serif;

  --r-card:   10px;
  --r-sm:     6px;
  --r-xs:     4px;

  --shadow-card: 0 2px 16px rgba(0,0,0,0.5), 0 1px 3px rgba(0,0,0,0.3);
  --shadow-glow-go: 0 0 20px var(--go-glow);
  --shadow-glow-blue: 0 0 20px var(--blue-glow);
}

/* ═══════════════════════════════════════════════════════════════
   RESET
═══════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:var(--bg0);color:var(--ink0);font-family:var(--font-ui);font-size:13px;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input{font-family:inherit;outline:none}
a{color:inherit;text-decoration:none}

/* ═══════════════════════════════════════════════════════════════
   LAYOUT GRID
═══════════════════════════════════════════════════════════════ */
.shell{
  display:grid;
  grid-template-rows:56px 1fr;
  grid-template-columns:260px 1fr;
  height:100vh;
}

/* ═══════════════════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════════════════ */
.topbar{
  grid-column:1/-1;
  background:var(--bg1);
  border-bottom:1px solid var(--line2);
  display:flex;align-items:center;gap:0;
  padding:0 0 0 0;
  position:relative;z-index:20;
}

.topbar-brand{
  display:flex;align-items:center;gap:10px;
  padding:0 20px;
  border-right:1px solid var(--line2);
  height:100%;
  flex-shrink:0;
  min-width:260px;
}

.brand-mark{
  width:30px;height:30px;
  background:linear-gradient(135deg,#1a56db,#00c6ff);
  border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-data);
  font-weight:700;font-size:14px;
  color:#fff;
  letter-spacing:-1px;
  box-shadow:0 0 14px rgba(26,86,219,0.5);
}

.brand-text{
  display:flex;flex-direction:column;gap:0;
}
.brand-name{
  font-size:13px;font-weight:700;
  letter-spacing:0.3px;color:var(--ink0);
  line-height:1.2;
}
.brand-sub{
  font-size:9px;font-weight:500;
  color:var(--ink2);letter-spacing:1.5px;text-transform:uppercase;
}

.topbar-live{
  display:flex;align-items:center;gap:8px;
  padding:0 20px;
  border-right:1px solid var(--line);
}

.live-dot{
  width:6px;height:6px;
  background:var(--go);border-radius:50%;
  box-shadow:0 0 8px var(--go);
  animation:livepulse 2s ease-in-out infinite;
}
@keyframes livepulse{
  0%,100%{opacity:.6;box-shadow:0 0 4px var(--go);}
  50%{opacity:1;box-shadow:0 0 12px var(--go);}
}
.live-text{
  font-family:var(--font-data);font-size:10px;font-weight:600;
  color:var(--go);letter-spacing:1.5px;
}

.topbar-stats{
  display:flex;align-items:center;flex:1;
  padding:0 4px;
  overflow:hidden;
}

.tstat{
  display:flex;flex-direction:column;gap:1px;
  padding:0 16px;
  border-right:1px solid var(--line);
  flex-shrink:0;
}
.tstat-label{
  font-size:9px;font-weight:600;
  text-transform:uppercase;letter-spacing:1px;
  color:var(--ink3);
}
.tstat-val{
  font-family:var(--font-data);
  font-size:13px;font-weight:600;
  color:var(--ink0);
  transition:color .3s;
}
.tstat-val.c-go{color:var(--go2);}
.tstat-val.c-warn{color:var(--warn2);}
.tstat-val.c-blue{color:var(--blue2);}
.tstat-val.c-purple{color:var(--purple2);}

.topbar-right{
  display:flex;align-items:center;gap:10px;
  padding:0 16px 0 12px;
  margin-left:auto;
  border-left:1px solid var(--line);
}

.ts-clock{
  font-family:var(--font-data);font-size:11px;
  color:var(--ink2);
}

.btn-refresh{
  display:flex;align-items:center;gap:6px;
  background:var(--bg4);
  border:1px solid var(--line2);
  border-radius:var(--r-sm);
  padding:6px 13px;
  font-size:12px;font-weight:600;
  color:var(--ink1);
  transition:all .2s;
}
.btn-refresh:hover{border-color:var(--blue);color:var(--blue2);}
.btn-refresh.spin .ri{animation:spin360 .5s linear;}
@keyframes spin360{to{transform:rotate(360deg);}}
.ri{display:inline-block;font-size:14px;}

/* ═══════════════════════════════════════════════════════════════
   SIDEBAR
═══════════════════════════════════════════════════════════════ */
.sidebar{
  background:var(--bg1);
  border-right:1px solid var(--line2);
  display:flex;flex-direction:column;
  overflow:hidden;
}

.sb-section{
  padding:14px 12px 12px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
}

.sb-head{
  font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:1.5px;
  color:var(--ink3);
  margin-bottom:9px;
  display:flex;align-items:center;justify-content:space-between;
}

/* Category pills */
.cat-list{display:flex;flex-direction:column;gap:2px;}
.cat-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;
  border-radius:var(--r-sm);
  border:1px solid transparent;
  cursor:pointer;
  transition:all .15s;
  user-select:none;
}
.cat-row:hover{background:var(--bg4);}
.cat-row.on{
  background:var(--blue-dim);
  border-color:rgba(41,121,255,0.25);
}
.cat-row-l{display:flex;align-items:center;gap:9px;}
.cat-pip{
  width:7px;height:7px;border-radius:2px;flex-shrink:0;
}
.cat-pip.all{background:linear-gradient(135deg,var(--blue),var(--cyan));}
.cat-pip.largecap{background:var(--blue2);}
.cat-pip.midcap{background:var(--purple2);}
.cat-pip.smallcap{background:var(--cyan);}
.cat-pip.ipo{background:var(--warn);}

.cat-name{
  font-size:12px;font-weight:600;
  color:var(--ink1);
}
.cat-row.on .cat-name{color:var(--ink0);}
.cat-num{
  font-family:var(--font-data);font-size:10px;
  background:var(--bg5);
  border:1px solid var(--line2);
  border-radius:var(--r-xs);
  padding:1px 6px;
  color:var(--ink2);
  min-width:22px;text-align:center;
}
.cat-row.on .cat-num{
  background:var(--blue-dim);
  border-color:rgba(41,121,255,0.3);
  color:var(--blue2);
}

/* Sort */
.sort-list{display:flex;flex-direction:column;gap:2px;}
.sort-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 10px;
  border-radius:var(--r-sm);
  border:1px solid transparent;
  cursor:pointer;
  font-size:12px;font-weight:600;
  color:var(--ink2);
  transition:all .15s;
}
.sort-row:hover{background:var(--bg4);color:var(--ink1);}
.sort-row.on{
  background:var(--blue-dim);
  border-color:rgba(41,121,255,0.2);
  color:var(--ink0);
}
.sort-ico{width:14px;height:14px;flex-shrink:0;}

/* Watchlist area */
.sb-wl{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:14px 12px 12px;
  display:flex;flex-direction:column;gap:0;
}
.sb-wl::-webkit-scrollbar{width:3px;}
.sb-wl::-webkit-scrollbar-thumb{background:var(--bg5);}

.wl-list{display:flex;flex-direction:column;gap:2px;margin-bottom:8px;}

.wl-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:7px 10px;
  border-radius:var(--r-sm);
  border:1px solid transparent;
  cursor:pointer;
  transition:all .15s;
}
.wl-row:hover{background:var(--bg4);}
.wl-row.on{
  background:rgba(41,121,255,0.08);
  border-color:rgba(41,121,255,0.2);
}
.wl-row-l{display:flex;align-items:center;gap:8px;}
.wl-ico{font-size:12px;}
.wl-name{font-size:12px;font-weight:600;color:var(--ink1);}
.wl-row.on .wl-name{color:var(--ink0);}
.wl-n{font-family:var(--font-data);font-size:10px;color:var(--ink3);}

.wl-editor{
  background:var(--bg3);
  border:1px solid var(--line2);
  border-radius:var(--r-sm);
  padding:10px;
  margin-top:4px;
  display:none;
}
.wl-editor.open{display:block;}

.wl-chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}

.chip{
  display:inline-flex;align-items:center;gap:4px;
  background:var(--bg5);
  border:1px solid var(--line2);
  border-radius:var(--r-xs);
  padding:2px 7px;
  font-family:var(--font-data);font-size:10px;
  color:var(--ink1);
}
.chip.lit{
  background:rgba(41,121,255,0.15);
  border-color:rgba(41,121,255,0.4);
  color:var(--blue2);
}
.chip-x{
  font-size:11px;color:var(--ink3);cursor:pointer;line-height:1;
}
.chip-x:hover{color:var(--stop2);}

.wl-inp{
  width:100%;background:var(--bg4);
  border:1px solid var(--line2);
  border-radius:var(--r-sm);
  padding:6px 10px;
  color:var(--ink0);
  font-family:var(--font-data);font-size:11px;
  text-transform:uppercase;
}
.wl-inp:focus{border-color:var(--blue);}
.wl-inp::placeholder{color:var(--ink3);text-transform:none;}

.btn-add-wl{
  width:24px;height:24px;
  background:var(--bg4);
  border:1px solid var(--line2);
  border-radius:5px;
  font-size:15px;
  display:flex;align-items:center;justify-content:center;
  color:var(--ink2);
  transition:all .15s;
}
.btn-add-wl:hover{border-color:var(--blue);color:var(--blue2);}

/* ═══════════════════════════════════════════════════════════════
   MAIN AREA
═══════════════════════════════════════════════════════════════ */
.main{
  display:flex;flex-direction:column;
  overflow:hidden;
  background:var(--bg0);
}

/* Toolbar */
.toolbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;
  border-bottom:1px solid var(--line);
  flex-shrink:0;
  background:var(--bg1);
}

.toolbar-l{display:flex;align-items:baseline;gap:10px;}

.sig-count{
  font-family:var(--font-data);
  font-size:24px;font-weight:700;
  color:var(--ink0);
  line-height:1;
}
.sig-label{
  font-size:12px;color:var(--ink2);font-weight:500;
}

/* ── cache-status badge ──────────────────────────── */
#cache-badge{
  display:inline-flex;align-items:center;gap:5px;
  font-size:10px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;
  padding:3px 8px;border-radius:99px;
  border:1px solid transparent;
  transition:opacity .3s;
}
#cache-badge.live{
  color:#22c55e;border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.08);
}
#cache-badge.cached{
  color:#f59e0b;border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.08);
}
#cache-badge .badge-dot{
  width:6px;height:6px;border-radius:50%;background:currentColor;
  animation:pulse-dot 2s infinite;
}
#last-updated-row{
  font-size:10px;color:var(--ink3);margin-left:2px;
}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
/* ─────────────────────────────────────────────────── */

.toolbar-r{display:flex;align-items:center;gap:8px;}

.search-inp{
  background:var(--bg3);
  border:1px solid var(--line2);
  border-radius:var(--r-sm);
  padding:6px 11px;
  color:var(--ink0);font-size:12px;
  width:170px;
  transition:border .2s;
}
.search-inp:focus{border-color:var(--blue);}
.search-inp::placeholder{color:var(--ink3);}

.view-toggle{
  display:flex;
  background:var(--bg3);
  border:1px solid var(--line2);
  border-radius:var(--r-sm);
  overflow:hidden;
}
.vbtn{
  padding:5px 9px;font-size:13px;
  color:var(--ink3);
  transition:all .15s;
}
.vbtn.on{background:var(--bg5);color:var(--ink0);}

.wl-badge{
  display:inline-flex;align-items:center;gap:5px;
  background:rgba(41,121,255,0.1);
  border:1px solid rgba(41,121,255,0.25);
  border-radius:var(--r-xs);
  padding:3px 9px;
  font-size:10px;font-weight:600;
  color:var(--blue2);
  cursor:pointer;
}
.wl-badge-x{font-size:11px;color:var(--ink2);}
.wl-badge-x:hover{color:var(--stop2);}

/* ═══════════════════════════════════════════════════════════════
   CARDS CONTAINER
═══════════════════════════════════════════════════════════════ */
.cards-wrap{
  flex:1;overflow-y:auto;padding:16px 18px;
}
.cards-wrap::-webkit-scrollbar{width:4px;}
.cards-wrap::-webkit-scrollbar-track{background:transparent;}
.cards-wrap::-webkit-scrollbar-thumb{background:var(--bg5);border-radius:2px;}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(288px,1fr));
  gap:10px;
}
.grid.lv{grid-template-columns:1fr;}

/* ═══════════════════════════════════════════════════════════════
   SIGNAL CARD
═══════════════════════════════════════════════════════════════ */
.card{
  background:var(--bg2);
  border:1px solid var(--line2);
  border-radius:var(--r-card);
  padding:14px;
  cursor:pointer;
  position:relative;overflow:hidden;
  transition:border-color .25s, box-shadow .25s, transform .15s;
  animation:fadeUp .22s ease-out both;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(8px);}
  to{opacity:1;transform:translateY(0);}
}
.card:hover{
  border-color:rgba(255,255,255,0.14);
  box-shadow:var(--shadow-card);
  transform:translateY(-1px);
}

/* status accent line */
.card::before{
  content:'';
  position:absolute;
  top:0;left:0;
  width:3px;height:100%;
  border-radius:var(--r-card) 0 0 var(--r-card);
}
.card.s-active::before{background:var(--go);}
.card.s-near::before{background:var(--warn);}
.card.s-stop::before{background:var(--stop);}
.card.s-locked::before{background:var(--blue2);}

/* watchlisted glow border */
.card.wl{
  border-color:rgba(41,121,255,0.35);
  box-shadow:inset 0 0 20px rgba(41,121,255,0.04);
}
.card.wl:hover{
  border-color:rgba(41,121,255,0.6);
  box-shadow:var(--shadow-glow-blue);
}

/* background tint by category */
.card.cat-largecap{background:linear-gradient(135deg,#0b1120 0%,#0c1528 100%);}
.card.cat-midcap{background:linear-gradient(135deg,#0b1120 0%,#110c20 100%);}
.card.cat-smallcap{background:linear-gradient(135deg,#0b1120 0%,#0b1620 100%);}
.card.cat-ipo{background:linear-gradient(135deg,#0b1120 0%,#15120a 100%);}

/* ── card header ── */
.card-head{
  display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:11px;
  padding-left:6px;
}
.card-head-l{}
.ticker{
  font-family:var(--font-data);
  font-size:17px;font-weight:700;
  color:var(--ink0);letter-spacing:0.3px;
  display:flex;align-items:center;gap:6px;
  line-height:1.1;
}
.wl-star{font-size:11px;color:var(--blue2);}

.card-pattern{
  font-size:10px;color:var(--ink2);
  margin-top:3px;
  display:flex;align-items:center;gap:4px;
}
.pdot{width:3px;height:3px;border-radius:50%;background:var(--ink3);flex-shrink:0;}

.card-badges{display:flex;align-items:center;gap:4px;flex-wrap:wrap;justify-content:flex-end;}

.badge{
  font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:.7px;
  padding:3px 7px;border-radius:var(--r-xs);
  border:1px solid;
  white-space:nowrap;
}
.badge.largecap{background:var(--blue-dim);border-color:rgba(41,121,255,.25);color:var(--blue2);}
.badge.midcap{background:rgba(170,0,255,.1);border-color:rgba(170,0,255,.25);color:var(--purple2);}
.badge.smallcap{background:rgba(0,229,255,.08);border-color:rgba(0,229,255,.2);color:var(--cyan);}
.badge.ipo{background:var(--warn-dim);border-color:rgba(255,179,0,.25);color:var(--warn2);}

.sbadge{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 6px;border-radius:var(--r-xs);border:1px solid;}
.sbadge.s-active{background:var(--go-dim);border-color:rgba(0,230,118,.25);color:var(--go2);}
.sbadge.s-near{background:var(--warn-dim);border-color:rgba(255,179,0,.25);color:var(--warn2);}
.sbadge.s-stop{background:var(--stop-dim);border-color:rgba(255,61,87,.25);color:var(--stop2);}
.sbadge.s-locked{background:var(--blue-dim);border-color:rgba(41,121,255,.25);color:var(--blue2);}

/* ── price row ── */
.price-row{
  display:flex;align-items:baseline;gap:9px;
  margin-bottom:11px;
  padding-left:6px;
}
.price-main{
  font-family:var(--font-data);
  font-size:24px;font-weight:700;
  color:var(--ink0);
  line-height:1;
}
.price-chg{
  font-family:var(--font-data);font-size:12px;font-weight:600;
  padding:2px 7px;border-radius:var(--r-xs);
}
.price-chg.up{background:var(--go-dim);color:var(--go2);}
.price-chg.dn{background:var(--stop-dim);color:var(--stop2);}
.price-chg.flat{background:var(--bg5);color:var(--ink2);}

/* ── KV grid ── */
.kv-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:6px;
  margin-bottom:10px;
}

.kv{
  background:var(--bg0);
  border:1px solid var(--line);
  border-radius:var(--r-sm);
  padding:8px 10px;
}
.kv-lbl{
  font-size:9px;font-weight:700;
  text-transform:uppercase;letter-spacing:1px;
  color:var(--ink3);margin-bottom:4px;
}
.kv-val{
  font-family:var(--font-data);
  font-size:12px;font-weight:600;
  color:var(--ink0);
}
.kv-val.go{color:var(--go2);}
.kv-val.stop{color:var(--stop2);}
.kv-val.warn{color:var(--warn2);}
.kv-val.blue{color:var(--blue2);}
.kv-sub{
  font-family:var(--font-data);font-size:9px;color:var(--ink3);
  margin-top:1px;
}

/* RR bar */
.rr-track{
  display:flex;align-items:center;gap:3px;margin-top:4px;
}
.rr-risk{height:3px;border-radius:1.5px;background:var(--stop);flex:1;}
.rr-reward{height:3px;border-radius:1.5px;background:var(--go);}

/* ── progress ── */
.prog-wrap{padding-left:6px;}
.prog-meta{
  display:flex;justify-content:space-between;
  font-family:var(--font-data);font-size:9px;
  color:var(--ink3);margin-bottom:4px;
}
.prog-track{
  height:4px;background:var(--bg5);border-radius:2px;
  position:relative;overflow:visible;
}
.prog-fill{
  height:100%;border-radius:2px;
  background:linear-gradient(90deg,var(--go),var(--blue));
  transition:width .7s ease;
  position:relative;
}
.prog-fill.risk{background:linear-gradient(90deg,var(--stop),var(--warn));}
.prog-entry{
  position:absolute;
  top:-2px;width:2px;height:8px;
  background:var(--warn);
  border-radius:1px;
  transform:translateX(-50%);
}

/* ── list view ── */
.grid.lv .card{
  display:grid;
  grid-template-columns:190px 170px 1fr 200px;
  align-items:center;gap:14px;
  padding:10px 14px 10px 17px;
}
.grid.lv .card::before{
  height:100%;width:3px;
  top:0;left:0;right:auto;
  border-radius:var(--r-card) 0 0 var(--r-card);
}
.grid.lv .card-head{margin-bottom:0;}
.grid.lv .price-row{margin-bottom:0;padding-left:0;}
.grid.lv .kv-grid{margin-bottom:0;}
.grid.lv .prog-wrap{display:none;}

/* ═══════════════════════════════════════════════════════════════
   SKELETON
═══════════════════════════════════════════════════════════════ */
.skel{
  background:var(--bg2);
  border:1px solid var(--line);
  border-radius:var(--r-card);
  padding:14px;
  animation:shimmer 1.8s ease-in-out infinite;
}
@keyframes shimmer{
  0%,100%{opacity:.4;}
  50%{opacity:.7;}
}
.skel-line{background:var(--bg5);border-radius:var(--r-xs);margin-bottom:7px;}
.skel-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px;}
.skel-cell{background:var(--bg5);border-radius:var(--r-sm);height:44px;}

/* ═══════════════════════════════════════════════════════════════
   EMPTY STATE
═══════════════════════════════════════════════════════════════ */
.empty{
  grid-column:1/-1;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;gap:10px;
  opacity:.5;
}
.empty-icon{font-size:32px;}
.empty-text{font-size:13px;color:var(--ink2);}

/* ═══════════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════════ */
.modal-wrap{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(6px);
  z-index:100;
  align-items:center;justify-content:center;
}
.modal-wrap.open{display:flex;}
.modal{
  background:var(--bg3);
  border:1px solid var(--line2);
  border-radius:12px;
  width:360px;padding:22px;
  animation:mIn .18s ease-out;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}
@keyframes mIn{from{opacity:0;transform:scale(.93);}to{opacity:1;transform:scale(1);}}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;}
.modal-inp{
  width:100%;background:var(--bg5);
  border:1px solid var(--line2);
  border-radius:var(--r-sm);
  padding:9px 12px;color:var(--ink0);font-size:13px;
  margin-bottom:12px;
}
.modal-inp:focus{border-color:var(--blue);}
.modal-acts{display:flex;gap:8px;justify-content:flex-end;}
.mbtn{
  background:var(--bg5);border:1px solid var(--line2);border-radius:var(--r-sm);
  padding:7px 16px;font-size:12px;font-weight:600;color:var(--ink1);
  transition:all .15s;
}
.mbtn:hover{color:var(--ink0);}
.mbtn.p{
  background:rgba(41,121,255,0.18);
  border-color:rgba(41,121,255,0.4);
  color:var(--blue2);
}
.mbtn.p:hover{background:rgba(41,121,255,0.28);}

/* ═══════════════════════════════════════════════════════════════
   STAGGER DELAYS
═══════════════════════════════════════════════════════════════ */
.card:nth-child(1){animation-delay:0s}
.card:nth-child(2){animation-delay:.03s}
.card:nth-child(3){animation-delay:.06s}
.card:nth-child(4){animation-delay:.09s}
.card:nth-child(5){animation-delay:.12s}
.card:nth-child(6){animation-delay:.15s}
.card:nth-child(7){animation-delay:.18s}
.card:nth-child(8){animation-delay:.21s}
.card:nth-child(9){animation-delay:.24s}
.card:nth-child(10){animation-delay:.27s}

/* ═══════════════════════════════════════════════════════════════
   TOOLTIP
═══════════════════════════════════════════════════════════════ */
[data-tip]{position:relative;}
[data-tip]:hover::after{
  content:attr(data-tip);
  position:absolute;bottom:calc(100% + 7px);left:50%;transform:translateX(-50%);
  background:var(--bg5);border:1px solid var(--line2);border-radius:5px;
  padding:4px 9px;font-size:10px;color:var(--ink1);

}

═══════════════════════════════════════════════════════════════ */
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--bg5);}

<script>
/* ═══════════════════════════════════════════════════════════════
   CONFIG
═══════════════════════════════════════════════════════════════ */
const API_URL   = "http://127.0.0.1:5000/signals";
const POLL_MS   = 12000;

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
const S = {
  signals: [],
  cat:  "all",
  sort: "score",
  view: "g",
  q:    "",
  watchlists: [],
  activeWL: null,
};

/* ─── Load / seed watchlists ─── */
try { S.watchlists = JSON.parse(localStorage.getItem("wl") || "[]"); } catch(e) { S.watchlists = []; }
if (!S.watchlists.length) {
  S.watchlists = [{ id:"hp", name:"⚡ High Priority", tickers:["SHAKTIPUMP","WAAREEENER","NSDL"] }];
  saveWL();
}

function saveWL() { localStorage.setItem("wl", JSON.stringify(S.watchlists)); }

/* ═══════════════════════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════════════════════ */
function fmt(n, dec=2) {
  if (n === null || n === undefined || isNaN(+n)) return "—";
  return (+n).toLocaleString("en-IN", { minimumFractionDigits:dec, maximumFractionDigits:dec });
}

function esc(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

function catLabel(c) {
  return {largecap:"LARGE",midcap:"MID",smallcap:"SMALL",ipo:"IPO"}[c] || String(c).toUpperCase();
}

function signalStatus(s) {
  const price  = s.price ?? s.entry;
  const entry  = s.entry;
  const target = s.target;
  const sl     = s.sl;
  if (price <= sl) return "stop";
  const dist = (target - price) / Math.max(target - entry, .001);
  if (dist <= 0.15) return "near";
  if (s.is_candidate || (s.candidate_score ?? 0) > 3) return "locked";
  return "active";
}

function statusLabel(st) {
  return {active:"● Active",near:"◑ Near Target",stop:"✕ Stop Hit",locked:"🔒 Locked"}[st] || st;
}

function isWatchlisted(ticker) {
  return S.watchlists.some(w => w.tickers.includes(ticker));
}

/* ═══════════════════════════════════════════════════════════════
   CATEGORY / SORT / VIEW
═══════════════════════════════════════════════════════════════ */
function setCat(c) {
  S.cat = c;
  document.querySelectorAll(".cat-row").forEach(el =>
    el.classList.toggle("on", el.dataset.cat === c));
  render();
}

function setSort(s) {
  S.sort = s;
  document.querySelectorAll(".sort-row").forEach(el =>
    el.classList.toggle("on", el.dataset.sort === s));
  render();
}

function setView(v) {
  S.view = v;
  document.getElementById("grid").classList.toggle("lv", v === "l");
  document.getElementById("vg").classList.toggle("on", v === "g");
  document.getElementById("vl").classList.toggle("on", v === "l");
}

/* ═══════════════════════════════════════════════════════════════
   SORT
═══════════════════════════════════════════════════════════════ */
function sorted(arr) {
  const a = [...arr];
  switch(S.sort) {
    case "rr":     a.sort((x,y) => (y.rr||0)-(x.rr||0)); break;
    case "target": a.sort((x,y) => (y.target_pct||0)-(x.target_pct||0)); break;
    case "az":     a.sort((x,y) => (x.ticker||"").localeCompare(y.ticker||"")); break;
    default:
      a.sort((x,y) => {
        const wlD = (isWatchlisted(y.ticker)?1:0)-(isWatchlisted(x.ticker)?1:0);
        if (wlD) return wlD;
        return (y.rr||0)-(x.rr||0);
      });
  }
  return a;
}

/* ═══════════════════════════════════════════════════════════════
   RENDER CARDS
═══════════════════════════════════════════════════════════════ */
function render() {
  const grid  = document.getElementById("grid");
  const q     = document.getElementById("search").value.trim().toUpperCase();
  const activeWL = S.watchlists.find(w => w.id === S.activeWL);

  let sigs = S.signals;
  if (S.cat !== "all") sigs = sigs.filter(s => s.category === S.cat);
  if (activeWL)        sigs = sigs.filter(s => activeWL.tickers.includes(s.ticker));
  if (q)               sigs = sigs.filter(s => (s.ticker||"").includes(q));
  sigs = sorted(sigs);

  document.getElementById("disp-count").textContent = sigs.length;
  document.getElementById("disp-label").textContent = sigs.length === 1 ? "signal" : "signals";

  if (!sigs.length) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No signals match your filters</div></div>`;
    return;
  }

  const fragment = document.createDocumentFragment();

  sigs.forEach((s, idx) => {
    const ticker   = s.ticker || "UNKNOWN";
    const price    = s.price ?? s.entry ?? 100;
    const entry    = s.entry ?? price;
    const target   = s.target ?? 0;
    const sl       = s.sl ?? 0;
    const tPct     = s.target_pct ?? 0;
    const slPct    = s.sl_pct ?? 0;
    const rr       = s.rr ?? 0;
    const rrText   = s.rr_text || `1:${rr}`;
    const pattern  = s.pattern || "—";
    const cat      = s.category || "smallcap";
    const status   = signalStatus(s);
    const wl       = isWatchlisted(ticker);
    const isLocked = s.is_candidate || (s.candidate_score ?? 0) > 3;

    const changePct = entry > 0 ? (price - entry) / entry * 100 : 0;
    const chgClass  = changePct > 0.01 ? "up" : changePct < -0.01 ? "dn" : "flat";
    const chgSign   = changePct >= 0 ? "+" : "";

    const range     = target - sl;
    const prog      = range > 0 ? Math.min(100, Math.max(0, (price - sl) / range * 100)) : 0;
    const entryMark = range > 0 ? Math.min(100, Math.max(0, (entry - sl) / range * 100)) : 50;
    const progRisk  = price < entry;

    const el = document.createElement("article");
    el.className = [
      "card",
      `s-${status}`,
      `cat-${cat}`,
      wl ? "wl" : "",
    ].filter(Boolean).join(" ");
    el.style.animationDelay = `${Math.min(idx, 10) * 0.028}s`;

    el.innerHTML = `
      <div class="card-head">
        <div class="card-head-l">
          <div class="ticker">
            ${esc(ticker)}
            ${wl ? '<span class="wl-star">★</span>' : ""}
          </div>
          <div class="card-pattern">
            <div class="pdot"></div>${esc(pattern)}
          </div>
        </div>
        <div class="card-badges">
          ${isLocked ? `<span class="sbadge s-locked">🔒 LOCKED</span>` : ""}
          <span class="badge ${cat}">${catLabel(cat)}</span>
          <span class="sbadge s-${status}">${statusLabel(status)}</span>
        </div>
      </div>

      <div class="price-row">
        <span class="price-main">₹${fmt(price)}</span>
        <span class="price-chg ${chgClass}">${chgSign}${fmt(changePct)}%</span>
      </div>

      <div class="kv-grid">
        <div class="kv">
          <div class="kv-lbl">Entry</div>
          <div class="kv-val blue">₹${fmt(entry)}</div>
        </div>
        <div class="kv">
          <div class="kv-lbl">Target</div>
          <div class="kv-val go">₹${fmt(target)}</div>
          <div class="kv-sub">+${fmt(tPct)}%</div>
        </div>
        <div class="kv">
          <div class="kv-lbl">Stop Loss</div>
          <div class="kv-val stop">₹${fmt(sl)}</div>
          <div class="kv-sub">${fmt(slPct)}%</div>
        </div>
        <div class="kv">
          <div class="kv-lbl">Risk : Reward</div>
          <div class="kv-val warn">${esc(rrText)}</div>
          <div class="rr-track">
            <div class="rr-risk"></div>
            <div class="rr-reward" style="flex:${Math.min(rr,6)};"></div>
          </div>
        </div>
      </div>

      <div class="prog-wrap">
        <div class="prog-meta">
          <span>SL ₹${fmt(sl)}</span>
          <span>→ Target</span>
          <span>₹${fmt(target)}</span>
        </div>
        <div class="prog-track">
          <div class="prog-fill${progRisk?" risk":""}" style="width:${prog}%"></div>
          <div class="prog-entry" style="left:${entryMark}%"></div>
        </div>
      </div>
    `;

    /* double-click to toggle watchlist */
    el.addEventListener("dblclick", () => {
      if (!S.activeWL) return;
      const wlObj = S.watchlists.find(w => w.id === S.activeWL);
      if (!wlObj) return;
      if (wlObj.tickers.includes(ticker)) wlObj.tickers = wlObj.tickers.filter(t=>t!==ticker);
      else wlObj.tickers.push(ticker);
      saveWL();
      renderWLSidebar();
      render();
    });

    fragment.appendChild(el);
  });

  grid.innerHTML = "";
  grid.appendChild(fragment);
}

/* ═══════════════════════════════════════════════════════════════
   COUNTS
═══════════════════════════════════════════════════════════════ */
function updateCounts(sigs) {
  const c = { largecap:0, midcap:0, smallcap:0, ipo:0 };
  sigs.forEach(s => { if (c[s.category] !== undefined) c[s.category]++; });
  document.getElementById("s-total").textContent  = sigs.length;
  document.getElementById("s-lc").textContent     = c.largecap;
  document.getElementById("s-mc").textContent     = c.midcap;
  document.getElementById("s-sc").textContent     = c.smallcap;
  document.getElementById("s-ipo").textContent    = c.ipo;
  document.getElementById("cn-all").textContent   = sigs.length;
  document.getElementById("cn-lc").textContent    = c.largecap;
  document.getElementById("cn-mc").textContent    = c.midcap;
  document.getElementById("cn-sc").textContent    = c.smallcap;
  document.getElementById("cn-ipo").textContent   = c.ipo;
}

/* ═══════════════════════════════════════════════════════════════
   WATCHLIST SIDEBAR
═══════════════════════════════════════════════════════════════ */
function renderWLSidebar() {
  const list   = document.getElementById("wl-list");
  const editor = document.getElementById("wl-editor");
  list.innerHTML = "";

  /* All Signals row */
  const all = document.createElement("div");
  all.className = "wl-row" + (S.activeWL === null ? " on" : "");
  all.innerHTML = `<div class="wl-row-l"><span class="wl-ico">📊</span><span class="wl-name">All Signals</span></div>`;
  all.onclick = () => { S.activeWL = null; renderWLSidebar(); render(); updatePill(); };
  list.appendChild(all);

  S.watchlists.forEach(w => {
    const row = document.createElement("div");
    row.className = "wl-row" + (S.activeWL === w.id ? " on" : "");
    row.innerHTML = `
      <div class="wl-row-l">
        <span class="wl-ico">★</span>
        <span class="wl-name">${esc(w.name)}</span>
      </div>
      <span class="wl-n">${w.tickers.length}</span>`;
    row.onclick = () => {
      S.activeWL = w.id;
      renderWLSidebar();
      render();
      updatePill();
      renderChips();
    };
    list.appendChild(row);
  });

  const activeWL = S.watchlists.find(w => w.id === S.activeWL);
  if (activeWL) {
    editor.classList.add("open");
    renderChips();
  } else {
    editor.classList.remove("open");
  }
}

function renderChips() {
  const wl = S.watchlists.find(w => w.id === S.activeWL);
  if (!wl) return;
  const container = document.getElementById("wl-chips");
  container.innerHTML = "";
  wl.tickers.forEach(t => {
    const c = document.createElement("div");
    c.className = "chip" + (S.signals.some(s => s.ticker === t) ? " lit" : "");
    c.innerHTML = `${esc(t)}<button class="chip-x" onclick="removeChip('${esc(t)}')">×</button>`;
    container.appendChild(c);
  });
}

function removeChip(t) {
  const wl = S.watchlists.find(w => w.id === S.activeWL);
  if (wl) {
    wl.tickers = wl.tickers.filter(x => x !== t);
    saveWL(); renderWLSidebar(); render();
  }
}

function handleWLKey(e) {
  if (e.key !== "Enter") return;
  const inp = document.getElementById("wl-inp");
  const val = inp.value.trim().toUpperCase().replace(".NS","");
  if (!val) return;
  const wl = S.watchlists.find(w => w.id === S.activeWL);
  if (wl && !wl.tickers.includes(val)) {
    wl.tickers.push(val);
    saveWL(); renderWLSidebar(); render();
  }
  inp.value = "";
}

function updatePill() {
  const pill = document.getElementById("wl-pill");
  const wl   = S.watchlists.find(w => w.id === S.activeWL);
  if (wl) {
    pill.style.display = "inline-flex";
    pill.innerHTML = `<span class="wl-badge">★ ${esc(wl.name)} <span class="wl-badge-x" onclick="S.activeWL=null;renderWLSidebar();render();updatePill();">×</span></span>`;
  } else {
    pill.style.display = "none";
  }
}

/* ═══════════════════════════════════════════════════════════════
   MODAL
═══════════════════════════════════════════════════════════════ */
function openModal() {
  document.getElementById("modal-wrap").classList.add("open");
  document.getElementById("modal-inp").value = "";
  setTimeout(() => document.getElementById("modal-inp").focus(), 60);
}
function closeModal(e) {
  if (!e || e.target === document.getElementById("modal-wrap"))
    document.getElementById("modal-wrap").classList.remove("open");
}
function createWL() {
  const name = document.getElementById("modal-inp").value.trim();
  if (!name) return;
  const id = "wl_" + Date.now();
  S.watchlists.push({ id, name, tickers: [] });
  saveWL();
  S.activeWL = id;
  closeModal();
  renderWLSidebar();
  render();
  updatePill();
}

/* ═══════════════════════════════════════════════════════════════
   CLOCK
═══════════════════════════════════════════════════════════════ */
function tickClock() {
  const now = new Date();
  document.getElementById("clock").textContent =
    now.toLocaleTimeString("en-IN", { hour:"2-digit", minute:"2-digit", second:"2-digit" });
}
setInterval(tickClock, 1000);
tickClock();

/* ═══════════════════════════════════════════════════════════════
   FETCH
═══════════════════════════════════════════════════════════════ */
function updateCacheBadge(cacheStatus) {
  const badge   = document.getElementById("cache-badge");
  const badgeTxt= document.getElementById("badge-text");
  const luRow   = document.getElementById("last-updated-row");
  if (!cacheStatus) { badge.style.display="none"; luRow.style.display="none"; return; }

  badge.style.display = "inline-flex";
  const isLive = cacheStatus.market_open && !cacheStatus.from_cache;
  badge.className = isLive ? "live" : "cached";
  badgeTxt.textContent = cacheStatus.status_label || (isLive ? "Live signals" : "Using last market signals");

  if (cacheStatus.last_updated) {
    luRow.style.display = "inline";
    luRow.textContent   = "Last updated: " + cacheStatus.last_updated;
  } else {
    luRow.style.display = "none";
  }
}

async function fetchSignals(manual=false) {
  const btn = document.getElementById("btn-refresh");
  btn.classList.add("spin");
  try {
    const res  = await fetch(API_URL, { cache:"no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    const data = await res.json();

    // New envelope format: { signals: [...], cache_status: {...} }
    // Backwards-compat: old format was a bare array
    if (Array.isArray(data)) {
      if (data.length) S.signals = data;
      updateCacheBadge(null);
    } else if (data && Array.isArray(data.signals)) {
      if (data.signals.length) S.signals = data.signals;
      updateCacheBadge(data.cache_status || null);
    }

    updateCounts(S.signals);
    render();
    renderChips();
  } catch (err) {
    /* silent — keep last good data */
    console.warn("Fetch failed:", err.message);
  } finally {
    setTimeout(() => btn.classList.remove("spin"), 600);
  }
}

/* ═══════════════════════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════════════════════ */
renderWLSidebar();
updatePill();
fetchSignals(true);
setInterval(() => fetchSignals(false), POLL_MS);
</script>
